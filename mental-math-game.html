<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧮 จินตคณิต</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0d1117;--s1:#161b22;--s2:#21262d;--s3:#30363d;
      --acc:#58a6ff;--gold:#ffd700;--grn:#3fb950;--red:#f85149;
      --ora:#e3b341;--pur:#bc8cff;--txt:#c9d1d9;--dim:#8b949e;
    }
    body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:12px;}
    .wrap{max-width:460px;margin:0 auto;}

    /* ─── TITLE ─────────────────────────────────────── */
    .title{text-align:center;font-size:26px;font-weight:900;letter-spacing:3px;
      background:linear-gradient(90deg,#ffd700,#ff8c00,#ff4500);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;}
    .subtitle{text-align:center;font-size:12px;color:var(--dim);margin-top:-8px;margin-bottom:12px;}

    /* ─── STATS ─────────────────────────────────────── */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
    .stat{background:var(--s1);border:1px solid var(--s2);border-radius:8px;padding:8px 4px;text-align:center;}
    .stat-lbl{font-size:10px;color:var(--dim);margin-bottom:2px;}
    .stat-val{font-size:22px;font-weight:bold;}
    .streak-fire{display:inline;}

    /* ─── ABACUS ─────────────────────────────────────── */
    .abacus-outer{background:#3d1f05;border-radius:14px;padding:10px;margin-bottom:12px;
      box-shadow:inset 0 2px 6px rgba(0,0,0,.6),0 4px 16px rgba(0,0,0,.5);
      border:2px solid #6b3510;}
    .abacus-inner{background:#4a2c0f;border-radius:10px;padding:12px 10px 8px;
      display:flex;justify-content:center;gap:8px;position:relative;}
    .abacus-title{position:absolute;top:-9px;left:50%;transform:translateX(-50%);
      background:#3d1f05;color:#c8843a;font-size:10px;padding:0 8px;letter-spacing:2px;}
    .ab-col{display:flex;flex-direction:column;align-items:center;width:36px;}
    .bead{width:32px;height:14px;border-radius:7px;margin:1.5px 0;
      transition:background .2s,box-shadow .2s;}
    .bh{background:linear-gradient(135deg,#f5c518,#e07d0c);
      box-shadow:0 2px 5px rgba(0,0,0,.5),inset 0 1px 1px rgba(255,255,255,.3);}
    .bh.off{background:#1e1000;box-shadow:inset 0 1px 3px rgba(0,0,0,.7);}
    .be{background:linear-gradient(135deg,#4cc9f0,#3a7bd5);
      box-shadow:0 2px 5px rgba(0,0,0,.5),inset 0 1px 1px rgba(255,255,255,.25);}
    .be.off{background:#0f1a2e;box-shadow:inset 0 1px 3px rgba(0,0,0,.7);}
    .ab-div{width:100%;height:3px;background:#1a0900;border-radius:2px;margin:4px 0;}
    .ab-lbl{font-size:9px;color:#a06030;margin-top:5px;}

    /* ─── PROBLEM CARD ───────────────────────────────── */
    .prob-card{background:var(--s1);border:1px solid var(--s2);border-radius:12px;
      padding:16px;margin-bottom:10px;min-height:110px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      position:relative;overflow:hidden;}
    .mode-badge{position:absolute;top:8px;right:8px;font-size:11px;padding:2px 9px;
      border-radius:20px;background:var(--s2);color:var(--dim);}
    .mode-badge.on{background:rgba(248,81,73,.18);color:var(--red);}
    .diff-badge{position:absolute;top:8px;left:8px;font-size:11px;padding:2px 9px;
      border-radius:20px;background:var(--s2);color:var(--dim);}
    .idle{color:var(--dim);font-size:15px;text-align:center;}
    .static-prob{font-size:28px;font-weight:bold;text-align:center;line-height:1.9;word-break:break-all;}
    .flash-num{font-size:64px;font-weight:900;text-align:center;
      animation:fin .18s ease;line-height:1.1;}
    .flash-op{font-size:44px;}
    @keyframes fin{from{transform:scale(1.4);opacity:0;}to{transform:scale(1);opacity:1;}}
    .think{color:var(--dim);font-size:15px;text-align:center;}

    /* ─── TIMER ──────────────────────────────────────── */
    #timer-wrap{margin-bottom:8px;}
    .tbar-bg{height:5px;background:var(--s2);border-radius:3px;overflow:hidden;margin-bottom:4px;}
    .tbar{height:100%;background:var(--gold);border-radius:3px;transition:width 1s linear,background .3s;}
    .tbar.danger{background:var(--red);}
    .tcnt{text-align:center;font-size:12px;color:var(--dim);}

    /* ─── ANSWER BOX ─────────────────────────────────── */
    .ans-box{background:var(--s1);border:2px solid var(--s2);border-radius:10px;
      padding:14px;text-align:center;font-size:36px;font-weight:bold;
      min-height:64px;margin-bottom:10px;letter-spacing:3px;
      transition:border-color .3s,background .3s;}
    .ans-box.ok{border-color:var(--grn);background:rgba(63,185,80,.1);animation:bop .4s ease;}
    .ans-box.err{border-color:var(--red);background:rgba(248,81,73,.1);animation:shk .4s ease;}
    @keyframes bop{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
    @keyframes shk{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

    /* ─── NUMPAD ─────────────────────────────────────── */
    .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
    .numpad button{padding:17px;font-size:22px;font-weight:bold;background:var(--s1);
      border:1px solid var(--s2);border-radius:10px;color:var(--txt);cursor:pointer;
      transition:background .1s,transform .1s;-webkit-tap-highlight-color:transparent;}
    .numpad button:active{background:var(--s2);transform:scale(.95);}
    .btn-del{color:var(--red) !important;}
    .btn-neg{color:var(--ora) !important;}
    .btn-ok{grid-column:span 3;
      background:linear-gradient(135deg,#196c2e,#2ea043) !important;
      border-color:#2ea043 !important;font-size:17px !important;color:#fff !important;}
    .btn-new{grid-column:span 3;
      background:linear-gradient(135deg,#5a3ec8,#8957e5) !important;
      border-color:#7048c8 !important;font-size:16px !important;color:#fff !important;}

    /* ─── INFO BOX ───────────────────────────────────── */
    .info{background:var(--s1);border:1px solid var(--s2);border-radius:8px;
      padding:8px 12px;font-size:13px;color:var(--dim);text-align:center;margin-bottom:10px;}
    .info.ok{border-color:var(--grn);color:var(--grn);}
    .info.err{border-color:var(--red);color:var(--red);}
    .info.warn{border-color:var(--ora);color:var(--ora);}

    /* ─── SETTINGS ───────────────────────────────────── */
    .sep{height:1px;background:var(--s2);margin:10px 0;}
    .sec-lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
    .pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
    .pill{padding:7px 13px;border-radius:20px;border:1px solid var(--s2);background:var(--s1);
      color:var(--dim);font-size:13px;cursor:pointer;transition:all .2s;
      -webkit-tap-highlight-color:transparent;}
    .pill:hover{border-color:var(--acc);}
    .pill.pd{background:rgba(88,166,255,.12);border-color:var(--acc);color:var(--acc);font-weight:bold;}
    .pill.po{background:rgba(255,215,0,.12);border-color:var(--gold);color:var(--gold);font-weight:bold;}
    .pill.pm{background:rgba(188,140,255,.12);border-color:var(--pur);color:var(--pur);font-weight:bold;}
    .speed-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
    .speed-row span{font-size:11px;color:var(--dim);}
    input[type=range]{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;
      background:var(--s2);outline:none;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
      border-radius:50%;background:var(--acc);cursor:pointer;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="title">🧮 จินตคณิต</div>
  <div class="subtitle">Mental Math — ฝึกคิดเลขในหัวด้วยลูกคิด</div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div class="stat-lbl">คะแนน</div><div class="stat-val" id="sc" style="color:var(--gold)">0</div></div>
    <div class="stat"><div class="stat-lbl">ถูก</div><div class="stat-val" id="co" style="color:var(--grn)">0</div></div>
    <div class="stat"><div class="stat-lbl">ผิด</div><div class="stat-val" id="wr" style="color:var(--red)">0</div></div>
    <div class="stat"><div class="stat-lbl">สตรีค🔥</div><div class="stat-val" id="st" style="color:var(--ora)">0</div></div>
  </div>

  <!-- Abacus -->
  <div class="abacus-outer">
    <div class="abacus-inner" id="abi">
      <span class="abacus-title">ลูกคิด</span>
    </div>
  </div>

  <!-- Problem -->
  <div class="prob-card" id="pcard">
    <span class="diff-badge" id="dbadge">ง่าย</span>
    <span class="mode-badge" id="mbadge">ปกติ</span>
    <div class="idle" id="pdisplay">กด <b>สุ่มโจทย์</b> หรือ <kbd>Space</kbd> เพื่อเริ่ม!</div>
  </div>

  <!-- Timer -->
  <div id="timer-wrap" style="display:none">
    <div class="tbar-bg"><div class="tbar" id="tbar" style="width:100%"></div></div>
    <div class="tcnt" id="tcnt">⏱ 10 วินาที</div>
  </div>

  <!-- Answer -->
  <div class="ans-box" id="abox">?</div>

  <!-- Numpad -->
  <div class="numpad">
    <button onclick="d('7')">7</button><button onclick="d('8')">8</button><button onclick="d('9')">9</button>
    <button onclick="d('4')">4</button><button onclick="d('5')">5</button><button onclick="d('6')">6</button>
    <button onclick="d('1')">1</button><button onclick="d('2')">2</button><button onclick="d('3')">3</button>
    <button class="btn-neg" onclick="neg()">±</button>
    <button onclick="d('0')">0</button>
    <button class="btn-del" onclick="del()">⌫</button>
    <button class="btn-ok" onclick="check()">✓ ตรวจคำตอบ</button>
    <button class="btn-new" onclick="newQ()">🎲 สุ่มโจทย์ใหม่</button>
  </div>

  <!-- Info -->
  <div class="info" id="info">เลือกระดับความยากแล้วกดสุ่มโจทย์!</div>

  <div class="sep"></div>

  <!-- Difficulty -->
  <div class="sec-lbl">ระดับความยาก</div>
  <div class="pills" id="dpills">
    <button class="pill pd" data-d="easy"    onclick="setD(this)">ง่าย</button>
    <button class="pill"    data-d="mid"     onclick="setD(this)">กลาง</button>
    <button class="pill"    data-d="hard"    onclick="setD(this)">ยาก</button>
    <button class="pill"    data-d="extreme" onclick="setD(this)">โหด</button>
    <button class="pill"    data-d="insane"  onclick="setD(this)">กาก💀</button>
    <button class="pill"    data-d="random"  onclick="setD(this)">สุ่ม🎲</button>
  </div>

  <!-- Operations -->
  <div class="sec-lbl">การดำเนินการ</div>
  <div class="pills" id="opills">
    <button class="pill po" data-op="+" onclick="togOp(this)">+ บวก</button>
    <button class="pill po" data-op="-" onclick="togOp(this)">− ลบ</button>
    <button class="pill po" data-op="*" onclick="togOp(this)">× คูณ</button>
    <button class="pill po" data-op="/" onclick="togOp(this)">÷ หาร</button>
  </div>

  <!-- Mode -->
  <div class="sec-lbl">โหมดเกม</div>
  <div class="pills" id="mpills">
    <button class="pill pm" data-m="normal" onclick="setM(this)">ปกติ</button>
    <button class="pill"    data-m="flash"  onclick="setM(this)">⚡ แฟลช</button>
    <button class="pill"    data-m="timer"  onclick="setM(this)">⏱ จับเวลา</button>
    <button class="pill"    data-m="both"   onclick="setM(this)">⚡⏱ รวม</button>
  </div>

  <!-- Flash speed -->
  <div id="fspeed" style="display:none">
    <div class="sec-lbl">ความเร็วแฟลช: <span id="splbl">1.0 วินาที/ตัวเลข</span></div>
    <div class="speed-row">
      <span>เร็ว</span>
      <input type="range" id="spslider" min="200" max="2500" value="1000" step="100" oninput="updSp()">
      <span>ช้า</span>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
const G = {
  ans: null, inp: '', score: 0, cor: 0, wrg: 0, str: 0,
  diff: 'easy', ops: new Set(['+','-','*','/']),
  mode: 'normal', tVal: 10, tMax: 10, tInt: null,
  fInt: null, fSpd: 1000, prob: null, done: false,
};

// ══════════════════════════════════════════════════════
// ABACUS
// ══════════════════════════════════════════════════════
function buildAb() {
  const el = document.getElementById('abi');
  el.innerHTML = '<span class="abacus-title">ลูกคิด</span>';
  const lbls = ['หมื่น','พัน','ร้อย','สิบ','หน่วย'];
  for (let c = 0; c < 5; c++) {
    const col = document.createElement('div');
    col.className = 'ab-col';
    col.innerHTML =
      `<div class="bead bh off" id="bh${c}"></div>` +
      `<div class="ab-div"></div>` +
      `<div class="bead be off" id="be${c}0"></div>` +
      `<div class="bead be off" id="be${c}1"></div>` +
      `<div class="bead be off" id="be${c}2"></div>` +
      `<div class="bead be off" id="be${c}3"></div>` +
      `<div class="ab-lbl">${lbls[c]}</div>`;
    el.appendChild(col);
  }
}

function showAb(n) {
  const abs = Math.min(Math.abs(Math.round(n || 0)), 99999);
  const digs = abs.toString().padStart(5,'0').split('').map(Number);
  for (let c = 0; c < 5; c++) {
    const dg = digs[c];
    document.getElementById(`bh${c}`).className = 'bead bh' + (dg >= 5 ? '' : ' off');
    const ev = dg % 5;
    for (let i = 0; i < 4; i++)
      document.getElementById(`be${c}${i}`).className = 'bead be' + (i < ev ? '' : ' off');
  }
}

function clearAb() {
  for (let c = 0; c < 5; c++) {
    document.getElementById(`bh${c}`).className = 'bead bh off';
    for (let i = 0; i < 4; i++)
      document.getElementById(`be${c}${i}`).className = 'bead be off';
  }
}

// ══════════════════════════════════════════════════════
// PROBLEM GENERATION
// ══════════════════════════════════════════════════════
const rnd = (a,b) => Math.floor(Math.random()*(b-a+1))+a;

function pickD() {
  if (G.diff === 'random') return ['easy','mid','hard','extreme','insane'][rnd(0,4)];
  return G.diff;
}

function genProb() {
  const avail = [...G.ops];
  if (!avail.length) return null;
  const op = avail[rnd(0, avail.length-1)];
  const d = pickD();
  if (op === '*') return genMul(d);
  if (op === '/') return genDiv(d);
  return genSeq(d);
}

function genMul(d) {
  let a, b;
  switch(d) {
    case 'easy':    a=rnd(2,9);   b=rnd(2,9);   break;
    case 'mid':     a=rnd(2,99);  b=rnd(2,9);   break;
    case 'hard':    a=rnd(10,99); b=rnd(10,99); break;
    case 'extreme': a=rnd(100,999);b=rnd(10,99);break;
    case 'insane':  a=rnd(100,9999);b=rnd(100,999);break;
    default:        a=rnd(2,99);  b=rnd(2,99);
  }
  return { nums:[a,b], ops:['*'], result:a*b };
}

function genDiv(d) {
  let div, quot;
  switch(d) {
    case 'easy':    div=rnd(2,9);  quot=rnd(1,9);   break;
    case 'mid':     div=rnd(2,9);  quot=rnd(10,99); break;
    case 'hard':    div=rnd(2,99); quot=rnd(10,99); break;
    case 'extreme': div=rnd(2,99); quot=rnd(100,999);break;
    case 'insane':  div=rnd(10,99);quot=rnd(1000,9999);break;
    default:        div=rnd(2,9);  quot=rnd(1,99);
  }
  return { nums:[div*quot, div], ops:['/'], result:quot };
}

function genSeq(d) {
  let cnt, mx;
  switch(d) {
    case 'easy':    cnt=rnd(2,4);  mx=9;    break;
    case 'mid':     cnt=rnd(3,6);  mx=99;   break;
    case 'hard':    cnt=rnd(5,8);  mx=999;  break;
    case 'extreme': cnt=rnd(7,10); mx=9999; break;
    case 'insane':  cnt=rnd(10,15);mx=9999; break;
    default:        cnt=rnd(3,7);  mx=999;
  }
  const haP = G.ops.has('+'), haM = G.ops.has('-');
  const ao = [];
  if (haP) ao.push('+');
  if (haM) ao.push('-');
  if (!ao.length) ao.push('+');

  const nums = [rnd(1, mx)];
  const ops  = [];
  let res = nums[0];
  for (let i = 1; i < cnt; i++) {
    const op = ao[rnd(0, ao.length-1)];
    let n;
    if (op === '-' && d === 'easy' && res > 0) n = rnd(1, Math.min(res, mx));
    else n = rnd(1, mx);
    nums.push(n);
    ops.push(op);
    res = op === '+' ? res+n : res-n;
  }
  return { nums, ops, result:Math.round(res) };
}

// ══════════════════════════════════════════════════════
// DISPLAY HELPERS
// ══════════════════════════════════════════════════════
const OC = {'+':'var(--acc)','-':'var(--red)','*':'var(--gold)','/':'#a8e063'};
const OS = {'+':'+','-':'−','*':'×','/':'÷'};
const DN = {easy:'ง่าย',mid:'กลาง',hard:'ยาก',extreme:'โหด',insane:'กาก💀',random:'สุ่ม🎲'};
const MN = {normal:'ปกติ',flash:'⚡ แฟลช',timer:'⏱ จับเวลา',both:'⚡⏱ รวม'};

function showStatic(p) {
  const el = document.getElementById('pdisplay');
  const isMD = p.ops.length===1 && (p.ops[0]==='*'||p.ops[0]==='/');
  el.className = 'static-prob';
  if (isMD) {
    const sym=OS[p.ops[0]], col=OC[p.ops[0]];
    el.innerHTML =
      `<span style="color:var(--txt)">${fmt(p.nums[0])}</span>` +
      `<span style="color:${col}"> ${sym} </span>` +
      `<span style="color:var(--txt)">${fmt(p.nums[1])}</span>` +
      `<span style="color:var(--dim)"> = ?</span>`;
  } else {
    let h = `<span style="color:var(--acc)">${fmt(p.nums[0])}</span>`;
    for (let i=0;i<p.ops.length;i++) {
      h += `<span style="color:${OC[p.ops[i]]}"> ${OS[p.ops[i]]} </span>`;
      h += `<span style="color:var(--txt)">${fmt(p.nums[i+1])}</span>`;
    }
    el.innerHTML = h;
  }
}

function showFlash(p) {
  clearInterval(G.fInt);
  const el = document.getElementById('pdisplay');
  const items = [{val:p.nums[0],op:null}];
  for (let i=0;i<p.ops.length;i++) items.push({val:p.nums[i+1],op:p.ops[i]});
  let idx=0, run=p.nums[0];

  function next() {
    if (idx >= items.length) {
      el.className='think';
      el.innerHTML='🧠 คิดคำตอบในหัว...';
      clearAb();
      if (G.mode==='both') startTimer();
      return;
    }
    const it=items[idx], col=it.op?OC[it.op]:'var(--acc)', sym=it.op?OS[it.op]:'';
    el.className='flash-num';
    el.innerHTML = it.op
      ? `<span class="flash-op" style="color:${col}">${sym}</span> <span style="color:var(--txt)">${fmt(it.val)}</span>`
      : `<span style="color:${col}">${fmt(it.val)}</span>`;
    if (idx>0) {
      const op=it.op;
      if (op==='+') run+=it.val;
      else if (op==='-') run-=it.val;
      else if (op==='*') run*=it.val;
      else if (op==='/') run/=it.val;
    }
    showAb(run);
    idx++;
    G.fInt = setTimeout(next, G.fSpd);
  }
  next();
}

function fmt(n) { return n.toLocaleString(); }

// ══════════════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════════════
function d(v) {
  if (G.done) { newQ(); return; }
  if (G.inp.replace('-','').length >= 9) return;
  G.inp += v;
  refreshAns();
}

function neg() {
  if (G.done) return;
  G.inp = G.inp.startsWith('-') ? G.inp.slice(1) : '-'+G.inp;
  refreshAns();
}

function del() {
  if (G.inp.length) { G.inp=G.inp.slice(0,-1); refreshAns(); }
}

function refreshAns() {
  const el = document.getElementById('abox');
  el.textContent = G.inp || '?';
  el.className = 'ans-box';
  const n = parseInt(G.inp);
  if (!isNaN(n)) showAb(n);
}

// ══════════════════════════════════════════════════════
// CHECK ANSWER
// ══════════════════════════════════════════════════════
function check() {
  if (G.done) { newQ(); return; }
  if (G.ans === null) { newQ(); return; }
  const ua = parseInt(G.inp);
  if (isNaN(ua)) { setInfo('กรุณากรอกตัวเลข!','warn'); return; }
  clearInterval(G.tInt); clearInterval(G.fInt);
  G.done = true;
  const el = document.getElementById('abox');
  if (ua === G.ans) {
    el.className='ans-box ok'; el.textContent=`✓ ${fmt(G.ans)}`;
    G.cor++; G.str++;
    const pts = calcPts();
    G.score += pts;
    setInfo(`✨ ถูกต้อง! +${pts} คะแนน  🔥 สตรีค ${G.str}`,'ok');
    showAb(G.ans);
  } else {
    el.className='ans-box err'; el.textContent=`✗ คำตอบ: ${fmt(G.ans)}`;
    G.wrg++; G.str=0; G.score=Math.max(0,G.score-5);
    setInfo(`❌ ผิด! คำตอบที่ถูก: ${fmt(G.ans)}`,'err');
    showAb(G.ans);
    if (G.mode==='flash'||G.mode==='both') showStatic(G.prob);
  }
  updStats();
}

function calcPts() {
  const dm = {easy:1,mid:2,hard:4,extreme:8,insane:12,random:4}[G.diff]||1;
  const sb = Math.min(G.str,20);
  const tb = (G.mode==='timer'||G.mode==='both') ? Math.ceil(G.tVal*2) : 0;
  return dm*10 + sb*3 + tb;
}

// ══════════════════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════════════════
function tMax() { return {easy:15,mid:12,hard:9,extreme:6,insane:4,random:10}[G.diff]||10; }

function startTimer() {
  G.tMax=tMax(); G.tVal=G.tMax;
  document.getElementById('timer-wrap').style.display='block';
  updTUI();
  clearInterval(G.tInt);
  G.tInt = setInterval(()=>{ G.tVal--; updTUI(); if(G.tVal<=0){clearInterval(G.tInt);timeUp();} },1000);
}

function updTUI() {
  const pct=(G.tVal/G.tMax)*100;
  const bar=document.getElementById('tbar');
  bar.style.width=pct+'%';
  bar.className='tbar'+(G.tVal<=3?' danger':'');
  document.getElementById('tcnt').textContent=`⏱ ${G.tVal} วินาที`;
}

function timeUp() {
  G.done=true; clearInterval(G.fInt);
  const el=document.getElementById('abox');
  el.className='ans-box err'; el.textContent=`⏰ ${fmt(G.ans??0)}`;
  G.wrg++; G.str=0; G.score=Math.max(0,G.score-3);
  setInfo(`⏰ หมดเวลา! คำตอบ: ${fmt(G.ans??0)}`,'err');
  if (G.prob) showStatic(G.prob);
  showAb(G.ans||0);
  updStats();
}

// ══════════════════════════════════════════════════════
// NEW QUESTION
// ══════════════════════════════════════════════════════
function newQ() {
  clearInterval(G.tInt); clearInterval(G.fInt);
  const p = genProb();
  if (!p) { setInfo('เลือกอย่างน้อย 1 การดำเนินการ!','warn'); return; }
  G.prob=p; G.ans=p.result; G.inp=''; G.done=false;
  const ab=document.getElementById('abox');
  ab.textContent='?'; ab.className='ans-box';
  clearAb();
  document.getElementById('timer-wrap').style.display='none';

  // Badges
  const rd=pickD();
  document.getElementById('dbadge').textContent=DN[rd]||G.diff;
  const mb=document.getElementById('mbadge');
  mb.textContent=MN[G.mode]||G.mode;
  mb.className='mode-badge'+(G.mode!=='normal'?' on':'');

  if (G.mode==='flash'||G.mode==='both') {
    showFlash(p);
    setInfo(G.mode==='flash'?'⚡ จดจำตัวเลขที่แฟลชขึ้นมา แล้วตอบ!':'⚡⏱ แฟลชแล้วจับเวลา!');
  } else {
    showStatic(p);
    showAb(p.nums[0]);
    if (G.mode==='timer') { startTimer(); setInfo('⏱ จับเวลา! คำนวณให้เร็วที่สุด!'); }
    else setInfo('💡 คิดเลขในหัวโดยจินตนาการลูกคิด แล้วกรอกคำตอบ');
  }
}

// ══════════════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════════════
function setD(btn) {
  G.diff = btn.dataset.d;
  document.querySelectorAll('#dpills .pill').forEach(b=>b.classList.remove('pd'));
  btn.classList.add('pd');
}

function togOp(btn) {
  const op = btn.dataset.op;
  if (G.ops.has(op)) {
    if (G.ops.size>1) { G.ops.delete(op); btn.classList.remove('po'); }
  } else {
    G.ops.add(op); btn.classList.add('po');
  }
}

function setM(btn) {
  G.mode = btn.dataset.m;
  document.querySelectorAll('#mpills .pill').forEach(b=>b.classList.remove('pm'));
  btn.classList.add('pm');
  document.getElementById('fspeed').style.display=
    (G.mode==='flash'||G.mode==='both')?'block':'none';
}

function updSp() {
  G.fSpd = parseInt(document.getElementById('spslider').value);
  document.getElementById('splbl').textContent=(G.fSpd/1000).toFixed(1)+' วินาที/ตัวเลข';
}

// ══════════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════════
function updStats() {
  document.getElementById('sc').textContent=G.score;
  document.getElementById('co').textContent=G.cor;
  document.getElementById('wr').textContent=G.wrg;
  document.getElementById('st').textContent=G.str;
}

function setInfo(msg, cls='') {
  const el=document.getElementById('info');
  el.textContent=msg; el.className='info'+(cls?' '+cls:'');
}

// ══════════════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  if(e.key>='0'&&e.key<='9'){d(e.key);return;}
  if(e.key==='Backspace') del();
  else if(e.key==='Enter') check();
  else if(e.key===' '){e.preventDefault();newQ();}
  else if(e.key==='-') neg();
});

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
buildAb();
updStats();
</script>
</body>
</html>
