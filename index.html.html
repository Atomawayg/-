<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧮 จินตคณิตด้วยลูกคิด - โรงเรียนอนุบาลรัตนบัณฑิต</title>
    <!-- ใช้ Tailwind CSS สำหรับ Layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ฟอนต์ภาษาไทย Prompt -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: {
                        wood: {
                            light: '#d2b48c',
                            base: '#8b4513',
                            dark: '#4a2511',
                            darker: '#2b1408'
                        },
                        brass: '#d4af37'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #e5e5e5;
            background-image: radial-gradient(#d4d4d4 1px, transparent 1px);
            background-size: 20px 20px;
            touch-action: manipulation;
        }

        /* Animations */
        @keyframes pop {
            0% { transform: scale(0.95); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .animate-pop { animation: pop 0.3s ease-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        /* Realistic Abacus Styles */
        .abacus-container {
            background: linear-gradient(135deg, #5c2c16, #3a1a0c);
            box-shadow: 15px 20px 30px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.1);
            border-radius: 6px;
            border: 2px solid #2b1408;
        }

        .abacus-frame {
            background: #eaddca;
            box-shadow: inset 5px 5px 15px rgba(0,0,0,0.6), inset -5px -5px 15px rgba(0,0,0,0.6);
        }

        .abacus-beam {
            background: linear-gradient(to bottom, #4a2511, #2b1408);
            border-top: 1px solid #7d3f1f;
            border-bottom: 2px solid #1a0c05;
            box-shadow: 0 8px 10px rgba(0,0,0,0.4);
            z-index: 20;
        }

        .rod {
            width: 5px;
            background: linear-gradient(to right, #a67c00, #f6e27a, #a67c00);
            height: 100%;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 2px 0 4px rgba(0,0,0,0.5);
            z-index: 5;
        }

        .bead {
            width: 52px;
            height: 22px;
            border-radius: 12px;
            cursor: pointer;
            transition: top 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: absolute;
            z-index: 10;
            background: radial-gradient(ellipse at center 30%, #f0a34a 0%, #a65d1b 40%, #5c2c09 100%);
            box-shadow: 0 5px 8px rgba(0,0,0,0.5), inset 0 -3px 6px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.3);
        }

        .bead::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 15%;
            width: 70%;
            height: 4px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(1px);
        }

        .paper-board {
            background-color: #faf9f6;
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 100% 2.5rem;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.15);
            border-left: 2px solid #ef4444;
            position: relative;
        }
        .paper-board::before {
            content: '';
            position: absolute;
            top: 0; left: 30px; bottom: 0;
            width: 1px;
            background: #ef4444;
        }

        /* ปรับขนาดบนหน้าจอต่างๆ ให้รองรับ iPad และมือถือทุกรุ่นอย่างสมบูรณ์ */
        @media (max-width: 1024px) {
            .bead { width: 48px; height: 20px; border-radius: 10px; }
        }
        @media (max-width: 768px) {
            .bead { width: 42px; height: 18px; border-radius: 9px; }
        }
        @media (max-width: 480px) {
            .bead { width: 34px; height: 16px; border-radius: 8px; }
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 flex flex-col font-sans">

    <!-- Header (มีโลโก้โรงเรียน) -->
    <header class="bg-white/95 backdrop-blur shadow-lg p-3 md:p-4 sticky top-0 z-50 border-b-4 border-wood-dark">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            
            <div class="flex items-center gap-3">
                <img src="image.png" alt="โลโก้โรงเรียนอนุบาลรัตนบัณฑิต" class="h-14 w-14 md:h-16 md:w-16 object-contain rounded-full shadow-sm bg-white" onerror="this.src='https://via.placeholder.com/150?text=Logo'">
                <div class="text-left">
                    <h1 class="text-xl md:text-2xl font-bold text-wood-darker">จินตคณิตด้วยลูกคิด</h1>
                    <p class="text-sm md:text-base text-gray-600 font-medium">โรงเรียนอนุบาลรัตนบัณฑิต</p>
                </div>
            </div>

            <div class="flex gap-3">
                <div id="score-display" class="bg-amber-100 px-4 py-2 rounded-lg font-bold text-amber-800 shadow-inner border border-amber-200">
                    🏆 คะแนน: 0
                </div>
                <div id="streak-display" class="bg-orange-100 px-4 py-2 rounded-lg font-bold text-orange-800 shadow-inner border border-orange-200 hidden">
                    🔥 ต่อเนื่อง: 0
                </div>
                <div id="timer-display" class="bg-red-100 px-4 py-2 rounded-lg font-bold text-red-800 shadow-inner border border-red-200 hidden">
                    ⏱️ เวลา: 60s
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto p-2 md:p-4 flex flex-col xl:flex-row gap-4 md:gap-8 items-center justify-center max-w-7xl mt-2 md:mt-4">
        
        <!-- Left Panel: Problem Board -->
        <div class="w-full xl:w-1/3 flex flex-col gap-4 md:gap-6">
            
            <!-- Controls Card -->
            <div class="bg-white p-5 rounded-xl shadow-lg border-t-4 border-wood-base">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-gray-800 flex items-center gap-2">
                        <span class="text-xl">⚙️</span> ตั้งค่าการฝึก
                    </h2>
                    <button onclick="toggleSound()" id="sound-btn" class="text-2xl hover:scale-110 transition-transform text-blue-600">🔊</button>
                </div>
                
                <div class="flex gap-2 mb-4">
                    <button id="btn-practice" onclick="setMode('practice')" class="flex-1 py-2 rounded-lg bg-wood-base text-white font-bold shadow-md transition-all active:scale-95">โหมดฝึกซ้อม</button>
                    <button id="btn-challenge" onclick="setMode('challenge')" class="flex-1 py-2 rounded-lg bg-gray-200 text-gray-700 font-bold shadow-sm transition-all hover:bg-gray-300 active:scale-95">จับเวลา 60s</button>
                </div>
                
                <div class="flex gap-2">
                    <button id="btn-easy" onclick="setDifficulty('easy')" class="flex-1 py-1 rounded-lg bg-green-100 text-green-800 font-bold border-2 border-green-500 shadow-sm">ง่าย</button>
                    <button id="btn-medium" onclick="setDifficulty('medium')" class="flex-1 py-1 rounded-lg bg-gray-100 text-gray-600 font-bold border-2 border-transparent hover:bg-gray-200">กลาง</button>
                    <button id="btn-hard" onclick="setDifficulty('hard')" class="flex-1 py-1 rounded-lg bg-gray-100 text-gray-600 font-bold border-2 border-transparent hover:bg-gray-200">ยาก</button>
                </div>
            </div>

            <!-- Realistic Paper Problem Board -->
            <div id="problem-board" class="paper-board p-6 rounded-md text-gray-800 relative min-h-[300px] flex flex-col items-center justify-center">
                <div class="absolute top-3 right-4 flex gap-2">
                    <button onclick="playDictation()" class="bg-blue-100 text-blue-700 p-2 rounded-full shadow hover:bg-blue-200 transition-colors" title="ฟังโจทย์">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"></path></svg>
                    </button>
                    <button onclick="stopDictation()" class="bg-red-100 text-red-700 p-2 rounded-full shadow hover:bg-red-200 transition-colors" title="หยุดเสียง">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>
                    </button>
                </div>

                <div class="ml-8 w-full">
                    <div id="math-problem" class="text-4xl md:text-5xl font-mono tracking-wider flex flex-col items-end gap-2 font-bold text-right w-32 mx-auto text-gray-800">
                        <!-- โจทย์จะถูกใส่ที่นี่ -->
                    </div>
                </div>
                
                <div class="mt-6 ml-8 w-full text-center">
                    <div class="text-lg font-bold text-indigo-600 mb-2" id="feedback-msg">คำตอบคือเท่าไหร่เอ่ย? ✏️</div>
                    <div class="flex gap-2 justify-center">
                        <input type="number" id="answer-input" placeholder="ตอบ..." class="w-32 text-2xl text-center py-2 rounded bg-white border-2 border-gray-400 focus:outline-none focus:border-blue-500 font-bold shadow-inner">
                        <button onclick="checkAnswer()" class="bg-blue-600 text-white px-6 rounded font-bold text-xl shadow-md border-b-4 border-blue-800 active:border-b-0 active:translate-y-1 transition-all">ส่ง</button>
                    </div>
                </div>
            </div>
            
            <button onclick="generateProblem()" class="w-full bg-wood-light text-wood-darker border-2 border-wood-base py-3 rounded-lg font-bold shadow-md hover:bg-[#e6cdb3] transition-colors flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                สุ่มโจทย์ใหม่
            </button>
        </div>

        <!-- Right Panel: Realistic Abacus -->
        <div class="w-full xl:w-2/3 flex flex-col items-center">
            
            <div class="abacus-container p-2 md:p-3 w-full max-w-4xl">
                <div class="abacus-frame relative w-full flex justify-center py-4 px-1 md:px-6 overflow-hidden">
                    
                    <div class="abacus-beam absolute top-[32%] left-0 w-full h-[10px] md:h-[16px]"></div>
                    
                    <div class="flex gap-2 sm:gap-4 md:gap-8 h-[240px] sm:h-[300px] md:h-[380px] relative px-1 md:px-2" id="abacus-columns">
                        <!-- ถูกสร้างด้วย JS -->
                    </div>

                </div>
            </div>

            <div class="mt-4 md:mt-6 flex flex-wrap justify-center gap-4 w-full max-w-3xl">
                <button onclick="resetAbacus()" class="bg-red-600 text-white px-8 py-3 rounded-lg font-bold shadow-lg border-b-4 border-red-800 hover:bg-red-500 active:border-b-0 active:translate-y-1 transition-all flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    เซ็ตลูกคิด (เคลียร์)
                </button>
                <div class="bg-white px-8 py-3 rounded-lg shadow-md border-2 border-gray-200 font-bold text-gray-700 text-lg flex items-center gap-2">
                    ลูกคิดมีค่า: <span id="abacus-value" class="text-blue-600 text-2xl font-mono">0</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl text-center max-w-sm w-full mx-4 shadow-2xl border-4 border-wood-base">
            <img src="image.png" alt="โลโก้โรงเรียน" class="h-20 w-20 mx-auto mb-4 object-contain" onerror="this.style.display='none'">
            <h2 class="text-3xl font-bold text-wood-dark mb-2">หมดเวลา! ⏰</h2>
            <p class="text-xl text-gray-700 mb-4">คะแนนที่ทำได้: <span id="final-score" class="font-bold text-3xl text-green-600">0</span></p>
            <p class="text-md text-gray-500 mb-6 bg-gray-100 py-2 rounded">สถิติสูงสุด: <span id="high-score" class="font-bold text-wood-base">0</span></p>
            <button onclick="closeModalAndRestart()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold text-lg shadow-md hover:bg-blue-700 transition-colors">
                เล่นอีกครั้ง 🔄
            </button>
        </div>
    </div>

    <script>
        let currentProblem = [];
        let expectedAnswer = 0;
        let score = 0;
        let streak = 0;
        let mode = 'practice'; 
        let difficulty = 'easy'; 
        let timeLeft = 60;
        let timerInterval;
        let soundEnabled = true;
        
        // ตัวแปรสำหรับระบบเสียงอ่านแบบใหม่
        let isDictating = false;
        let dictationIndex = 0;
        let dictationTimer = null;
        
        let abacusState = [0, 0, 0, 0, 0, 0];

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }

        function playSound(type) {
            if (!soundEnabled) return;
            initAudio();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'click') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
                gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('sound-btn').innerText = soundEnabled ? '🔊' : '🔇';
            document.getElementById('sound-btn').className = soundEnabled ? 'text-2xl hover:scale-110 transition-transform text-blue-600' : 'text-2xl hover:scale-110 transition-transform text-gray-400';
        }

        function renderAbacus() {
            const container = document.getElementById('abacus-columns');
            container.innerHTML = '';
            
            abacusState.forEach((val, colIndex) => {
                const colDiv = document.createElement('div');
                colDiv.className = 'w-10 sm:w-12 md:w-16 h-full relative flex flex-col items-center group';
                
                if ((abacusState.length - 1 - colIndex) % 3 === 0) {
                    const dot = document.createElement('div');
                    dot.className = 'absolute top-[34%] w-2 h-2 bg-black rounded-full z-30 opacity-50';
                    colDiv.appendChild(dot);
                }

                const rod = document.createElement('div');
                rod.className = 'rod';
                colDiv.appendChild(rod);

                const isUpperActive = val >= 5;
                const upperBead = createBead(isUpperActive, () => toggleUpper(colIndex));
                upperBead.style.top = isUpperActive ? '24%' : '4%'; 
                colDiv.appendChild(upperBead);

                const lowerCount = val % 5;
                for (let i = 0; i < 4; i++) {
                    const isLowerActive = i < lowerCount; 
                    const lowerBead = createBead(isLowerActive, () => toggleLower(colIndex, i));
                    
                    const activeTop = 38 + (i * 7); 
                    const inactiveTop = 58 + (i * 7); 
                    
                    lowerBead.style.top = isLowerActive ? `${activeTop}%` : `${inactiveTop}%`;
                    colDiv.appendChild(lowerBead);
                }

                container.appendChild(colDiv);
            });
            updateAbacusValueDisplay();
        }

        function createBead(isActive, onClick) {
            const bead = document.createElement('div');
            bead.className = 'bead';
            bead.onclick = () => {
                playSound('click');
                onClick();
            };
            return bead;
        }

        function toggleUpper(colIndex) {
            if (abacusState[colIndex] >= 5) abacusState[colIndex] -= 5;
            else abacusState[colIndex] += 5;
            renderAbacus();
        }

        function toggleLower(colIndex, clickedIndex) {
            const currentLower = abacusState[colIndex] % 5;
            const targetValue = clickedIndex + 1;

            if (currentLower === targetValue) {
                abacusState[colIndex] -= 1;
            } else if (currentLower < targetValue) {
                abacusState[colIndex] += (targetValue - currentLower);
            } else {
                 abacusState[colIndex] -= (currentLower - clickedIndex);
            }
            renderAbacus();
        }

        function resetAbacus() {
            abacusState = [0, 0, 0, 0, 0, 0];
            playSound('click'); 
            renderAbacus();
        }

        function updateAbacusValueDisplay() {
            let total = 0;
            let multiplier = Math.pow(10, abacusState.length - 1);
            abacusState.forEach(val => {
                total += val * multiplier;
                multiplier /= 10;
            });
            document.getElementById('abacus-value').innerText = total.toLocaleString('th-TH');
        }

        function setDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('#btn-easy, #btn-medium, #btn-hard').forEach(btn => {
                btn.className = "flex-1 py-1 rounded-lg bg-gray-100 text-gray-600 font-bold border-2 border-transparent hover:bg-gray-200 transition-colors";
            });
            const activeColors = { 
                easy: 'bg-green-100 text-green-800 border-green-500 shadow-sm', 
                medium: 'bg-yellow-100 text-yellow-800 border-yellow-500 shadow-sm', 
                hard: 'bg-red-100 text-red-800 border-red-500 shadow-sm' 
            };
            document.getElementById(`btn-${level}`).className = `flex-1 py-1 rounded-lg font-bold border-2 ${activeColors[level]}`;
            generateProblem();
        }

        function setMode(newMode) {
            mode = newMode;
            
            const btnPrac = document.getElementById('btn-practice');
            const btnChal = document.getElementById('btn-challenge');
            
            if (mode === 'practice') {
                btnPrac.className = "flex-1 py-2 rounded-lg bg-wood-base text-white font-bold shadow-md transition-all active:scale-95";
                btnChal.className = "flex-1 py-2 rounded-lg bg-gray-200 text-gray-700 font-bold shadow-sm transition-all hover:bg-gray-300 active:scale-95";
                document.getElementById('timer-display').classList.add('hidden');
                document.getElementById('streak-display').classList.add('hidden');
                clearInterval(timerInterval);
                score = 0; streak = 0;
                updateScore();
                generateProblem();
            } else {
                btnChal.className = "flex-1 py-2 rounded-lg bg-red-600 text-white font-bold shadow-md transition-all active:scale-95";
                btnPrac.className = "flex-1 py-2 rounded-lg bg-gray-200 text-gray-700 font-bold shadow-sm transition-all hover:bg-gray-300 active:scale-95";
                document.getElementById('timer-display').classList.remove('hidden');
                document.getElementById('streak-display').classList.remove('hidden');
                startChallenge();
            }
        }

        function generateProblem() {
            stopDictation();
            document.getElementById('answer-input').value = '';
            const feedback = document.getElementById('feedback-msg');
            feedback.innerText = 'คำตอบคือเท่าไหร่เอ่ย? ✏️';
            feedback.className = 'text-lg font-bold text-indigo-600 mb-2';
            
            let numRows, maxVal, allowNegative;
            if (difficulty === 'easy') {
                numRows = Math.floor(Math.random() * 2) + 2; 
                maxVal = 20; allowNegative = false;
            } else if (difficulty === 'medium') {
                numRows = Math.floor(Math.random() * 2) + 3; 
                maxVal = 99; allowNegative = false;
            } else {
                numRows = Math.floor(Math.random() * 3) + 4; 
                maxVal = 999; allowNegative = true;
            }

            currentProblem = [];
            let currentTotal = 0;

            let firstNum = Math.floor(Math.random() * maxVal) + 1;
            currentProblem.push(firstNum);
            currentTotal += firstNum;

            for (let i = 1; i < numRows; i++) {
                let num = Math.floor(Math.random() * maxVal) + 1;
                
                if (allowNegative && currentTotal - num > 0 && Math.random() > 0.5) {
                    currentProblem.push(-num);
                    currentTotal -= num;
                } else if (!allowNegative && currentTotal - num >= 0 && Math.random() > 0.4) {
                    currentProblem.push(-num);
                    currentTotal -= num;
                } else {
                    currentProblem.push(num);
                    currentTotal += num;
                }
            }
            
            expectedAnswer = currentTotal;
            renderProblem();
        }

        function renderProblem() {
            const board = document.getElementById('math-problem');
            board.innerHTML = '';
            
            currentProblem.forEach((num, index) => {
                const div = document.createElement('div');
                div.className = 'flex justify-between w-full pb-1 mb-1 border-b-2 border-transparent';
                
                if(index === currentProblem.length - 1) {
                    div.classList.replace('border-transparent', 'border-gray-800');
                }

                let sign = '';
                if (index > 0) {
                    sign = num >= 0 ? '+' : '-';
                }
                
                const absNum = Math.abs(num);
                
                div.innerHTML = `
                    <span class="text-red-600 w-8 text-left">${sign}</span>
                    <span class="w-full text-right tracking-widest">${absNum}</span>
                `;
                board.appendChild(div);
            });
        }

        // --- ระบบเสียงอ่านแบบใหม่ (เว้นวรรค) ---
        function playDictation() {
            if (!('speechSynthesis' in window)) {
                alert("เบราว์เซอร์ไม่รองรับเสียงอ่านครับ");
                return;
            }
            stopDictation();
            isDictating = true;
            dictationIndex = 0;
            speakNext();
        }

        function speakNext() {
            if (!isDictating) return;

            let textToRead = "";
            
            if (dictationIndex < currentProblem.length) {
                let num = currentProblem[dictationIndex];
                if (dictationIndex === 0) textToRead = `${num}`;
                else {
                    if (num >= 0) textToRead = `เพิ่ม ${num}`;
                    else textToRead = `ลด ${Math.abs(num)}`;
                }
            } else if (dictationIndex === currentProblem.length) {
                textToRead = "เซต!";
            } else {
                isDictating = false;
                return; 
            }

            let utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.lang = 'th-TH';
            
            utterance.rate = difficulty === 'easy' ? 0.85 : (difficulty === 'medium' ? 0.95 : 1.05);
            
            utterance.onend = () => {
                if (!isDictating) return;
                dictationIndex++;
                
                let pauseTime = 0;
                if (dictationIndex <= currentProblem.length) {
                    if (difficulty === 'easy') pauseTime = 1200; 
                    else if (difficulty === 'medium') pauseTime = 800; 
                    else pauseTime = 400; 
                }
                
                dictationTimer = setTimeout(speakNext, pauseTime);
            };
            
            window.speechSynthesis.speak(utterance);
        }

        function stopDictation() {
            isDictating = false;
            clearTimeout(dictationTimer);
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        }

        function checkAnswer() {
            const inputVal = document.getElementById('answer-input').value;
            if (inputVal === '') return;

            const userAnswer = parseInt(inputVal);
            const feedback = document.getElementById('feedback-msg');
            const board = document.getElementById('problem-board');

            if (userAnswer === expectedAnswer) {
                playSound('correct');
                board.classList.remove('animate-shake');
                void board.offsetWidth;
                board.classList.add('animate-pop');
                
                let points = 10;
                streak++;
                if(streak > 2) points += 5 * Math.min(streak - 2, 5); 

                score += points;
                feedback.innerText = '🌟 ถูกต้อง! เก่งมาก 🌟';
                feedback.className = 'text-lg text-green-600 font-bold mb-2';
                
                updateScore();
                
                setTimeout(() => {
                    generateProblem();
                    if(mode === 'practice') resetAbacus(); 
                }, 1200);

            } else {
                playSound('wrong');
                board.classList.remove('animate-pop');
                void board.offsetWidth;
                board.classList.add('animate-shake');
                
                streak = 0;
                updateScore();
                
                feedback.innerText = '❌ ผิดครับ ลองดูใหม่นะ!';
                feedback.className = 'text-lg text-red-600 font-bold mb-2';
                document.getElementById('answer-input').value = '';
                document.getElementById('answer-input').focus();
            }
        }

        function startChallenge() {
            clearInterval(timerInterval);
            score = 0; streak = 0; timeLeft = 60;
            updateScore();
            document.getElementById('timer-display').innerText = `⏱️ เวลา: ${timeLeft}s`;
            generateProblem();
            resetAbacus();

            timerInterval = setInterval(() => {
                timeLeft--;
                const timerEl = document.getElementById('timer-display');
                timerEl.innerText = `⏱️ เวลา: ${timeLeft}s`;
                
                if (timeLeft <= 10) {
                    timerEl.classList.replace('text-red-800', 'text-red-900');
                    timerEl.classList.replace('bg-red-100', 'bg-red-200');
                    timerEl.classList.add('animate-pop');
                }

                if (timeLeft <= 0) endChallenge();
            }, 1000);
        }

        function endChallenge() {
            clearInterval(timerInterval);
            stopDictation();
            document.getElementById('timer-display').classList.remove('animate-pop');
            
            let highScore = localStorage.getItem('abacusHighScoreReal') || 0;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('abacusHighScoreReal', highScore);
            }

            document.getElementById('final-score').innerText = score;
            document.getElementById('high-score').innerText = highScore;
            document.getElementById('game-over-modal').classList.remove('hidden');
            document.getElementById('game-over-modal').classList.add('flex');
        }

        function closeModalAndRestart() {
            document.getElementById('game-over-modal').classList.add('hidden');
            document.getElementById('game-over-modal').classList.remove('flex');
            startChallenge();
        }

        function updateScore() {
            document.getElementById('score-display').innerText = `🏆 คะแนน: ${score}`;
            document.getElementById('streak-display').innerText = `🔥 ต่อเนื่อง: ${streak}`;
        }

        document.getElementById('answer-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkAnswer();
        });

        // Init: โหลดทันที ไม่ต้องรอรูป
        document.addEventListener('DOMContentLoaded', () => {
            abacusState = [0, 0, 0, 0, 0, 0];
            renderAbacus();
            generateProblem();
        });

    </script>
</body>
